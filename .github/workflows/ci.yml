name: CI

# Runs on every push and pull request.
# Governance, architecture, and anti-execution enforcement tests are
# included in the pytest step. A failure in any category blocks the build.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff — lint
        run: ruff check src/ tests/

      - name: black — format check
        run: black --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Architecture enforcement: DAG boundaries, forbidden imports, repo structure
      - name: Architecture enforcement tests
        run: pytest tests/architecture/ -v --tb=short --no-header

      # Governance enforcement: agent registry, ADR structure, objectives,
      # cross-references, anti-live-trading, anti-LLM-execution, handoffs, audits
      - name: Governance enforcement tests
        run: pytest tests/governance/ -v --tb=short --no-header

      # Unit tests: all component-level tests with coverage
      - name: Unit tests
        run: pytest tests/unit/ -v --cov=src/aqcs --cov-report=term-missing --no-header
